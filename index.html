<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NoteBuddy</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet"/>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>

<script>
Prism.plugins.autoloader.languages_path =
  "https://cdn.jsdelivr.net/npm/prismjs/components/";
</script>

<style>
/* ===== YOUR CSS (UNCHANGED) ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --accent:#fff;
  --text:#ececf1;
  --muted:#777;
  --border:#1a1a1a;
  --radius:14px;
  --font-display:'Syne',sans-serif;
  --font-mono:'DM Mono',monospace;
}

body{
  background:#212121;
  color:var(--text);
  font-family:var(--font-mono);
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

header{
  padding:16px 24px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-mark{
  width:30px;height:30px;
  background:#fff;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
}

header h1{font-family:var(--font-display);font-size:16px}

.header-tag{
  margin-left:auto;
  font-size:10px;
  color:#fff;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:999px;
  padding:4px 10px;
}

/* ===== THEME BUTTON ===== */
#theme-btn{
  width:36px;height:36px;
  border:1px solid #2a2a2a;
  background:#111;
  border-radius:999px;
  cursor:pointer;
  position:relative;
  margin-left:10px;
}

#theme-btn::before{
  content:"";
  width:16px;height:16px;
  background:#fff;
  border-radius:50%;
  position:absolute;
  left:9px;top:9px;
  box-shadow:-5px 0 0 2px #111;
}

/* ===== THEME SIDEBAR (NEW) ===== */
#theme-panel{
  position:fixed;
  top:0;
  right:-280px;
  width:260px;
  height:100%;
  background:#111;
  border-left:1px solid #222;
  transition:0.25s ease;
  z-index:999;
  padding:20px;
}

#theme-panel.open{
  right:0;
}

/* ===== CHAT (UNCHANGED) ===== */
#chat-window{flex:1;overflow-y:auto;padding:28px 0}

.messages-inner{
  max-width:700px;
  margin:0 auto;
  padding:0 20px;
  display:flex;
  flex-direction:column;
  gap:4px;
}

.msg-row{display:flex;flex-direction:column}

.msg-row.user{align-items:flex-end;margin-top:14px}
.msg-row.ai{align-items:flex-start}

.bubble{
  max-width:88%;
  padding:11px 15px;
  border-radius:var(--radius);
  line-height:1.8;
  font-size:13.5px;
}

.bubble.user{
  background:#0d0d0d;
  border:1px solid #222;
}

.bubble.ai{
  background:#0d0d0d;
  border:1px solid #1f1f1f;
}

.ai-warning{
  font-size:10px;
  opacity:0.4;
  margin-top:8px;
}
</style>
</head>

<body>

<header>
  <div class="logo-mark">📚</div>
  <h1>NoteBuddy</h1>
  <span class="header-tag">Free</span>

  <!-- YOUR BUTTON -->
  <button id="theme-btn"></button>
</header>

<!-- ===== NEW THEME SIDEBAR ===== -->
<div id="theme-panel">
  <h3 style="color:white;">Themes</h3>
  <p style="color:#777;font-size:12px;margin-top:10px;">
    (future: dark / light / neon)
  </p>
</div>

<!-- CHAT -->
<div id="chat-window">
  <div class="messages-inner" id="messages"></div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="user-input"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>

/* ===== YOUR CHAT (UNCHANGED) ===== */
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("user-input");

/* ===== THEME LOGIC (NEW ONLY) ===== */
const panel = document.getElementById("theme-panel");
const btn = document.getElementById("theme-btn");

btn.addEventListener("click", (e)=>{
  e.stopPropagation();
  panel.classList.toggle("open");
});

document.addEventListener("click",(e)=>{
  if(!panel.contains(e.target) && e.target !== btn){
    panel.classList.remove("open");
  }
});

/* ===== YOUR ORIGINAL FUNCTION (NOT CHANGED) ===== */
function add(role,text){
  const row=document.createElement("div");
  row.className="msg-row "+role;

  const bubble=document.createElement("div");
  bubble.className="bubble "+role;
  bubble.innerHTML=text;

  row.appendChild(bubble);
  messagesEl.appendChild(row);
}

function sendMessage(){
  const text=inputEl.value.trim();
  if(!text)return;

  add("user",text);
  inputEl.value="";

  add("ai","AI response placeholder (your API stays untouched)");
}

</script>

</body>
</html>
