<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteBuddy</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet" />

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #ffffff;
  --accent-dim: rgba(200,240,96,0.1);
  --text: #e8eaf0;
  --muted: #555;
  --border: #1a1a1a;
  --radius: 14px;
  --font-display: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

body {
  background: #212121;
  color: #ececf1;
  font-family: var(--font-mono);
  font-size: 14px;
  height: 100dvh;
  display: flex;
  overflow: hidden;
}

/* SIMPLE SIDEBAR (minimal change) */
#sidebar {
  width: 160px;
  border-right: 1px solid var(--border);
  padding: 10px;
  overflow-y: auto;
}

.chat-item {
  font-size: 11px;
  padding: 6px;
  margin-bottom: 4px;
  cursor: pointer;
  border-radius: 6px;
  color: #aaa;
}
.chat-item:hover {
  background: #111;
  color: white;
}

#main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

#chat-window {
  flex: 1;
  overflow-y: auto;
  padding: 28px 0;
}

.messages-inner {
  max-width: 700px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.msg-row {
  display: flex;
  flex-direction: column;
  margin-bottom: 2px;
}

.msg-row.user { align-items: flex-end; margin-top: 14px; }
.msg-row.ai { align-items: flex-start; margin-top: 4px; }

.msg-label {
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 5px;
}

.bubble {
  max-width: 88%;
  padding: 11px 15px;
  border-radius: var(--radius);
  line-height: 1.8;
  font-size: 13.5px;
}

.bubble.user {
  background: #0d0d0d;
  border: 1px solid #222;
}

.bubble.ai {
  background: #0d0d0d;
  border: 1px solid #1f1f1f;
}

.input-area {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
}

.input-wrap {
  display: flex;
  gap: 10px;
}

#user-input {
  flex: 1;
  background: #303030;
  border: none;
  color: white;
  padding: 10px;
  border-radius: 10px;
}

#send-btn {
  background: white;
  border: none;
  border-radius: 8px;
  padding: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">

<header>
  <h1>NoteBuddy</h1>
</header>

<div id="chat-window">
  <div class="messages-inner" id="messages"></div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="user-input" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

</div>

<script>
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("user-input");
const sidebar = document.getElementById("sidebar");

let chats = JSON.parse(localStorage.getItem("chats") || "[]");
let activeChat = null;

function save() {
  localStorage.setItem("chats", JSON.stringify(chats));
}

function renderSidebar() {
  sidebar.innerHTML = "";
  chats.forEach(c => {
    const div = document.createElement("div");
    div.className = "chat-item";
    div.textContent = c.name;
    div.onclick = () => loadChat(c.id);
    sidebar.appendChild(div);
  });
}

function newChat() {
  const chat = {
    id: Date.now(),
    name: "Chat " + (chats.length + 1),
    messages: []
  };
  chats.push(chat);
  activeChat = chat;
  save();
  renderSidebar();
  renderChat();
}

function loadChat(id) {
  activeChat = chats.find(c => c.id === id);
  renderChat();
}

function renderChat() {
  messagesEl.innerHTML = "";
  if (!activeChat) return;

  activeChat.messages.forEach(m => {
    const row = document.createElement("div");
    row.className = "msg-row " + m.role;

    const bubble = document.createElement("div");
    bubble.className = "bubble " + m.role;
    bubble.innerHTML = m.text;

    row.appendChild(bubble);
    messagesEl.appendChild(row);
  });
}

async function sendMessage() {
  if (!activeChat) newChat();

  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = "";

  activeChat.messages.push({ role: "user", text });

  renderChat();

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      history: activeChat.messages.map(m => ({
        role: m.role === "user" ? "user" : "model",
        parts: [{ text: m.text }]
      }))
    })
  });

  const data = await res.json();

  const reply = data.reply || "No response";

  activeChat.messages.push({ role: "ai", text: reply });

  save();
  renderChat();
  renderSidebar();
}

renderSidebar();
if (chats.length) loadChat(chats[0].id);
</script>

</body>
</html>
