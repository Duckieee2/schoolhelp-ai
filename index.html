<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteBuddy</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet" />

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#212121;color:#eee;font-family:DM Mono;
  display:flex;height:100vh;overflow:hidden
}

/* SIDEBAR */
#sidebar{
  width:220px;background:#111;border-right:1px solid #222;
  display:flex;flex-direction:column
}
#newChat{
  padding:10px;margin:10px;background:#222;border:none;
  color:white;cursor:pointer;border-radius:8px
}
.chat-item{
  padding:10px;border-bottom:1px solid #1f1f1f;
  cursor:pointer;font-size:12px
}
.chat-item:hover{background:#1a1a1a}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column}

header{
  padding:12px;border-bottom:1px solid #222;
  display:flex;align-items:center;gap:10px
}

#chat{
  flex:1;overflow:auto;padding:20px
}

.msg{margin:8px 0;max-width:80%}
.user{margin-left:auto;background:#0d0d0d;padding:10px;border-radius:10px}
.ai{background:#151515;padding:10px;border-radius:10px}

#inputArea{
  display:flex;padding:10px;border-top:1px solid #222
}
textarea{
  flex:1;background:#111;border:none;color:white;
  padding:10px;resize:none;border-radius:8px
}
button{
  margin-left:10px;padding:10px;background:white;
  border:none;border-radius:8px;cursor:pointer
}
</style>
</head>

<body>

<div id="sidebar">
  <button id="newChat">+ New Chat</button>
  <div id="chatList"></div>
</div>

<div id="main">

<header>
  <strong>NoteBuddy</strong>
</header>

<div id="chat"></div>

<div id="inputArea">
  <textarea id="input" rows="1"></textarea>
  <button onclick="send()">Send</button>
</div>

</div>

<script>
const input = document.getElementById("input");
const chat = document.getElementById("chat");
const chatList = document.getElementById("chatList");

let chats = JSON.parse(localStorage.getItem("chats") || "[]");
let activeChat = null;

function save(){
  localStorage.setItem("chats", JSON.stringify(chats));
}

function renderSidebar(){
  chatList.innerHTML = "";
  chats.forEach(c=>{
    const div = document.createElement("div");
    div.className="chat-item";
    div.textContent = c.name || "Chat";
    div.onclick=()=>loadChat(c.id);
    chatList.appendChild(div);
  });
}

function newChat(){
  const id = Date.now();
  const chatObj = {id, name:"Chat "+(chats.length+1), messages:[]};
  chats.push(chatObj);
  activeChat = chatObj;
  save();
  renderSidebar();
  renderChat();
}

function loadChat(id){
  activeChat = chats.find(c=>c.id===id);
  renderChat();
}

function renderChat(){
  chat.innerHTML="";
  if(!activeChat) return;

  activeChat.messages.forEach(m=>{
    const div=document.createElement("div");
    div.className="msg "+m.role;
    div.innerHTML=m.text;
    chat.appendChild(div);
  });
}

async function send(){
  if(!activeChat) newChat();

  const text = input.value.trim();
  if(!text) return;

  input.value="";

  activeChat.messages.push({role:"user",text});
  renderChat();

  const resDiv = document.createElement("div");
  resDiv.className="msg ai";
  resDiv.textContent="...";

  chat.appendChild(resDiv);

  const res = await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      history: activeChat.messages.map(m=>({
        role:m.role==="user"?"user":"model",
        parts:[{text:m.text}]
      }))
    })
  });

  const data = await res.json();
  const reply = data.reply;

  resDiv.innerHTML = marked.parse(reply);

  activeChat.messages.push({role:"ai",text:reply});

  save();
  renderSidebar();
}

document.getElementById("newChat").onclick=newChat;

renderSidebar();
if(chats.length) loadChat(chats[0].id);
</script>

</body>
</html>
