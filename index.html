<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteBuddy</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>

<script>
Prism.plugins.autoloader.languages_path =
  "https://cdn.jsdelivr.net/npm/prismjs/components/";
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #212121;
  --panel: #0f0f0f;
  --panel2: #141414;
  --border: #1f1f1f;
  --text: #ececf1;
  --muted: #777;
  --accent: #c8f060;
  --radius: 14px;
  --mono: "DM Mono", monospace;
  --display: "Syne", sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  height: 100vh;
  overflow: hidden;
}

/* SIDEBAR */
#sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 260px;
  height: 100%;
  background: var(--panel);
  border-right: 1px solid var(--border);
  transform: translateX(-100%);
  transition: 0.2s ease;
  z-index: 1000;
  padding: 12px;
}

#sidebar.open {
  transform: translateX(0);
}

.sidebar-title {
  font-family: var(--display);
  font-weight: 700;
  margin-bottom: 10px;
}

.sidebar-item {
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--muted);
}

.sidebar-item:hover {
  background: var(--panel2);
  color: var(--text);
}

/* overlay */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  z-index: 900;
}

#overlay.show {
  display: block;
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}

.menu-btn {
  width: 34px;
  height: 34px;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  margin-right: 10px;
}

h1 {
  font-family: var(--display);
  font-size: 16px;
}

/* CHAT ISLAND */
.wrapper {
  display: flex;
  justify-content: center;
  height: calc(100vh - 60px);
}

.chat-island {
  width: 720px;
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin: 18px;
  overflow: hidden;
  background: var(--panel);
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.msg {
  margin-bottom: 10px;
}

.user {
  text-align: right;
}

.bubble {
  display: inline-block;
  padding: 10px 12px;
  border-radius: 12px;
  max-width: 85%;
  background: var(--panel2);
  border: 1px solid var(--border);
}

.user .bubble {
  background: #1a1a1a;
}

/* INPUT */
.input {
  display: flex;
  border-top: 1px solid var(--border);
}

textarea {
  flex: 1;
  padding: 12px;
  background: transparent;
  border: none;
  color: var(--text);
  outline: none;
  resize: none;
}

button {
  width: 60px;
  background: var(--accent);
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-title">Chats</div>
  <div class="sidebar-item">New Chat</div>
</div>

<div id="overlay"></div>

<header>
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <h1>NoteBuddy</h1>
</header>

<div class="wrapper">
  <div class="chat-island">

    <div id="chat"></div>

    <div class="input">
      <textarea id="input" placeholder="Ask something..."></textarea>
      <button onclick="send()">➤</button>
    </div>

  </div>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function toggleSidebar() {
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

overlay.onclick = () => {
  sidebar.classList.remove("open");
  overlay.classList.remove("show");
};

function add(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerHTML = `<div class="bubble">${text}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  add("user", text);
  input.value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      history: [{ role: "user", parts: [{ text }] }]
    })
  });

  const data = await res.json();
  add("ai", data.reply || "No response");
}
</script>

</body>
</html>
