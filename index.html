<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteBuddy</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet" />

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>

<style>
/* KEEPING YOUR ORIGINAL UI (unchanged) */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background:#212121;
  color:#ececf1;
  font-family:'DM Mono', monospace;
  height:100vh;
  display:flex;
  overflow:hidden;
}

/* SIDEBAR (minimal add) */
#sidebar {
  width:180px;
  border-right:1px solid #1a1a1a;
  padding:10px;
  overflow-y:auto;
}

.chat-item {
  font-size:11px;
  padding:6px;
  margin-bottom:5px;
  cursor:pointer;
  color:#aaa;
  border-radius:6px;
}
.chat-item:hover { background:#111; color:white; }

#main { flex:1; display:flex; flex-direction:column; }

header {
  padding:16px;
  border-bottom:1px solid #1a1a1a;
  display:flex;
  justify-content:space-between;
}

#newChatBtn {
  background:#fff;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* CHAT */
#chat-window { flex:1; overflow:auto; padding:20px; }
.msg { margin:8px 0; max-width:80%; }
.user { margin-left:auto; background:#0d0d0d; padding:10px; border-radius:10px; }
.ai { background:#151515; padding:10px; border-radius:10px; }

#input {
  width:100%;
  padding:10px;
  background:#111;
  border:none;
  color:white;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">

<header>
  <div>NoteBuddy</div>
  <button id="newChatBtn">New Chat</button>
</header>

<div id="chat-window"></div>

<div>
  <textarea id="input" rows="2"></textarea>
</div>

</div>

<script>
const chatWindow = document.getElementById("chat-window");
const input = document.getElementById("input");
const sidebar = document.getElementById("sidebar");

let chats = JSON.parse(localStorage.getItem("chats") || "[]");
let activeChat = null;

function save() {
  localStorage.setItem("chats", JSON.stringify(chats));
}

/* ---------------- CHAT SYSTEM ---------------- */

function newChat() {
  const chat = {
    id: Date.now(),
    name: "Chat " + (chats.length + 1),
    messages: []
  };

  chats.push(chat);
  activeChat = chat;

  save();
  renderSidebar();
  renderChat();
}

function loadChat(id) {
  activeChat = chats.find(c => c.id === id);
  renderChat();
}

function renderSidebar() {
  sidebar.innerHTML = "";

  chats.forEach(c => {
    const div = document.createElement("div");
    div.className = "chat-item";
    div.textContent = c.name;
    div.onclick = () => loadChat(c.id);
    sidebar.appendChild(div);
  });
}

/* ---------------- CHAT RENDER ---------------- */

function renderChat() {
  chatWindow.innerHTML = "";
  if (!activeChat) return;

  activeChat.messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + m.role;
    div.innerHTML = m.text;
    chatWindow.appendChild(div);
  });
}

/* ---------------- TYPEWRITER (RESTORED) ---------------- */

function typeText(el, text, cb) {
  let i = 0;
  let out = "";

  function tick() {
    if (i < text.length) {
      out += text[i++];
      el.innerHTML = out;
      requestAnimationFrame(tick);
    } else cb?.();
  }

  tick();
}

/* ---------------- SEND ---------------- */

async function send() {
  const text = input.value.trim();
  if (!text) return;

  if (!activeChat) newChat();

  input.value = "";

  activeChat.messages.push({ role: "user", text: text });
  renderChat();

  const aiDiv = document.createElement("div");
  aiDiv.className = "msg ai";
  chatWindow.appendChild(aiDiv);

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      history: activeChat.messages.map(m => ({
        role: m.role === "user" ? "user" : "model",
        parts: [{ text: m.text }]
      }))
    })
  });

  const data = await res.json();
  const reply = data.reply || "";

  activeChat.messages.push({ role: "ai", text: reply });

  typeText(aiDiv, reply, () => {
    save();
    renderSidebar();
  });
}

/* ---------------- EVENTS ---------------- */

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

document.getElementById("newChatBtn").onclick = newChat;

/* INIT */
renderSidebar();
if (chats.length) loadChat(chats[0].id);
</script>

</body>
</html>
