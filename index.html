<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NoteBuddy</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet"/>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>

  <script>
    Prism.plugins.autoloader.languages_path =
      "https://cdn.jsdelivr.net/npm/prismjs/components/";
  </script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #ffffff;
      --accent-dim: rgba(255,255,255,0.08);
      --text: #ececf1;
      --muted: #777;
      --border: #1a1a1a;
      --radius: 14px;

      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: #212121;
      color: var(--text);
      font-family: var(--font-mono);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      background: #fff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    header h1 {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
    }

    .header-tag {
      margin-left: auto;
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
    }

    /* ===== THEME BUTTON ===== */
    #theme-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: #111;
      border: 1px solid #2a2a2a;
      cursor: pointer;
      margin-left: 10px;
      position: relative;
    }

    #theme-btn::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      top: 9px;
      left: 9px;
      box-shadow: -5px 0 0 2px #111;
    }

    /* ===== SIDE PANEL ===== */
    #theme-panel {
      position: fixed;
      top: 0;
      right: -260px;
      width: 260px;
      height: 100%;
      background: #111;
      border-left: 1px solid #222;
      transition: 0.25s ease;
      z-index: 999;
      padding: 16px;
    }

    #theme-panel.open {
      right: 0;
    }

    .theme-option {
      padding: 10px;
      margin-top: 10px;
      background: #1a1a1a;
      border-radius: 10px;
      cursor: pointer;
    }

    .theme-option:hover {
      background: #222;
    }

    /* ===== CHAT (UNCHANGED) ===== */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 28px 0;
      scroll-behavior: smooth;
    }

    .messages-inner {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg-row {
      display: flex;
      flex-direction: column;
    }

    .msg-row.user { align-items: flex-end; margin-top: 14px; }
    .msg-row.ai { align-items: flex-start; margin-top: 4px; }

    .bubble {
      max-width: 88%;
      padding: 11px 15px;
      border-radius: var(--radius);
      line-height: 1.8;
      font-size: 13.5px;
    }

    .bubble.user {
      background: #0d0d0d;
      border: 1px solid #222;
    }

    .bubble.ai {
      background: #0d0d0d;
      border: 1px solid #1f1f1f;
    }

    .ai-warning {
      margin-top: 8px;
      font-size: 10px;
      opacity: 0.4;
    }

    /* INPUT (UNCHANGED) */
    .input-area {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
    }

    .input-wrap {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      background: #303030;
      border-radius: var(--radius);
      padding: 10px;
    }

    #user-input {
      flex: 1;
      background: none;
      border: none;
      color: white;
      outline: none;
    }

    #send-btn {
      width: 34px;
      height: 34px;
      background: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <div class="logo-mark">📚</div>
  <h1>NoteBuddy</h1>
  <span class="header-tag">Free</span>

  <button id="theme-btn"></button>
</header>

<!-- SIDE PANEL -->
<div id="theme-panel">
  <h3 style="color:white;">Themes</h3>

  <div class="theme-option" onclick="setTheme('dark')">🌑 Dark</div>
  <div class="theme-option" onclick="setTheme('moon')">🌙 Moon</div>
</div>

<div id="chat-window">
  <div class="messages-inner" id="messages"></div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="user-input"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
/* ===== THEME LOGIC ===== */
const panel = document.getElementById("theme-panel");
const btn = document.getElementById("theme-btn");

btn.onclick = () => {
  panel.classList.toggle("open");
};

document.addEventListener("click", (e) => {
  if (!panel.contains(e.target) && e.target !== btn) {
    panel.classList.remove("open");
  }
});

function setTheme(mode) {
  if (mode === "moon") {
    document.body.style.background = "#0b0b10";
  } else {
    document.body.style.background = "#212121";
  }
}

/* ===== YOUR ORIGINAL CHAT LOGIC (UNCHANGED CORE) ===== */
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("user-input");

function addMessage(role, text, isThinking=false) {
  const row = document.createElement("div");
  row.className = "msg-row " + role;

  const bubble = document.createElement("div");
  bubble.className = "bubble " + role;

  if (isThinking) {
    bubble.innerHTML = "Thinking...";
  } else {
    if (role === "ai") {
      bubble.innerHTML = `
        ${text}
        <div class="ai-warning">
          This message is AI-generated and may contain incorrect information
        </div>
      `;
    } else {
      bubble.innerHTML = text;
    }
  }

  row.appendChild(bubble);
  messagesEl.appendChild(row);
}

/* demo */
addMessage("ai", "Hello!");
addMessage("user", "Hi");
</script>

</body>
</html>
