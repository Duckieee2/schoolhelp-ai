<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NoteBuddy</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet"/>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>

<script>
Prism.plugins.autoloader.languages_path =
  "https://cdn.jsdelivr.net/npm/prismjs/components/";
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --accent:#fff;
  --text:#ececf1;
  --muted:#777;
  --border:#1a1a1a;
  --radius:14px;
  --font-display:'Syne',sans-serif;
  --font-mono:'DM Mono',monospace;
}

body{
  background:#212121;
  color:var(--text);
  font-family:var(--font-mono);
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */
header{
  padding:16px 24px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-mark{
  width:30px;height:30px;
  background:#fff;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
}

header h1{
  font-family:var(--font-display);
  font-size:16px;
}

/* MOON THEME BUTTON */
#theme-btn{
  margin-left:auto;
  width:36px;height:36px;
  border-radius:999px;
  border:1px solid #2a2a2a;
  background:#0f0f0f;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

#theme-btn::before{
  content:"";
  position:absolute;
  width:18px;height:18px;
  background:#fff;
  border-radius:50%;
  top:9px;left:9px;
}

#theme-btn::after{
  content:"";
  position:absolute;
  width:18px;height:18px;
  background:#0f0f0f;
  border-radius:50%;
  top:7px;left:13px;
}

/* SIDEBAR */
.theme-panel{
  position:fixed;
  right:-260px;
  top:0;
  width:240px;
  height:100%;
  background:#111;
  border-left:1px solid #222;
  transition:0.25s ease;
  padding:20px;
  z-index:999;
}

.theme-panel.open{
  right:0;
}

/* CHAT */
#chat-window{
  flex:1;
  overflow-y:auto;
  padding:28px 0;
}

.messages-inner{
  max-width:700px;
  margin:0 auto;
  padding:0 20px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.msg-row{display:flex;flex-direction:column}
.msg-row.user{align-items:flex-end;margin-top:14px}
.msg-row.ai{align-items:flex-start}

.bubble{
  max-width:88%;
  padding:11px 15px;
  border-radius:var(--radius);
  font-size:13.5px;
  line-height:1.8;
}

.bubble.user{
  background:#0d0d0d;
  border:1px solid #222;
}

.bubble.ai{
  background:#0d0d0d;
  border:1px solid #1f1f1f;
}

/* INPUT */
.input-area{
  padding:14px 20px 20px;
  border-top:1px solid var(--border);
}

.input-wrap{
  max-width:700px;
  margin:0 auto;
  display:flex;
  gap:10px;
  padding:10px;
  background:#303030;
  border-radius:var(--radius);
}

#user-input{
  flex:1;
  background:none;
  border:none;
  outline:none;
  color:#fff;
}

/* WARNING */
.ai-warning{
  font-size:10px;
  opacity:0.4;
  margin-top:8px;
}
</style>
</head>

<body>

<header>
  <div class="logo-mark">📚</div>
  <h1>NoteBuddy</h1>

  <button id="theme-btn"></button>
</header>

<!-- SIDE PANEL -->
<div class="theme-panel" id="theme-panel">
  <h3 style="color:#fff;">Themes</h3>
  <p style="color:#777;font-size:12px;margin-top:10px;">
    More themes coming soon.
  </p>
</div>

<div id="chat-window">
  <div class="messages-inner" id="messages"></div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="user-input" placeholder="Ask..." rows="1"></textarea>
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const panel = document.getElementById("theme-panel");
const btn = document.getElementById("theme-btn");

btn.onclick = (e) => {
  e.stopPropagation();
  panel.classList.toggle("open");
};

document.addEventListener("click", (e) => {
  if (!panel.contains(e.target) && e.target !== btn) {
    panel.classList.remove("open");
  }
});

/* CHAT (kept minimal working version) */
const messages = document.getElementById("messages");
const input = document.getElementById("user-input");

function add(role,text){
  const row=document.createElement("div");
  row.className="msg-row "+role;

  const bubble=document.createElement("div");
  bubble.className="bubble "+role;
  bubble.innerHTML=text;

  if(role==="ai"){
    const warn=document.createElement("div");
    warn.className="ai-warning";
    warn.textContent="This message is AI-generated and may be incorrect";
    bubble.appendChild(warn);
  }

  row.appendChild(bubble);
  messages.appendChild(row);
}

function sendMessage(){
  const text=input.value.trim();
  if(!text)return;

  add("user",text);
  input.value="";

  setTimeout(()=>{
    add("ai","This is a demo response.");
  },400);
}
</script>

</body>
</html>
