<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NoteBuddy</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">

  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet"/>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>

  <script>
    Prism.plugins.autoloader.languages_path =
      "https://cdn.jsdelivr.net/npm/prismjs/components/";
  </script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #ffffff;
      --accent-dim: rgba(255,255,255,0.08);
      --text: #ececf1;
      --muted: #777;
      --border: #1a1a1a;
      --radius: 14px;
      --logo-bg: #fff;
      --logo-stroke: #000;

      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg, #212121);
      color: var(--text);
      font-family: var(--font-mono);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg, #212121);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.3s, border-color 0.3s;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      background: var(--logo-bg, #fff);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.3s;
    }

    .logo-mark:hover {
      transform: scale(1.07);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.1);
    }

    .logo-mark svg {
      width: 16px;
      height: 16px;
    }

    header h1 {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    #theme-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--btn-border, #2a2a2a);
      background: var(--btn-bg, #111);
      border-radius: 999px;
      cursor: pointer;
      transition: 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      margin-left: auto;
    }

    #theme-btn:hover {
      background: var(--btn-hover, #1b1b1b);
      transform: scale(1.06);
    }

    /* ── THEME SIDEBAR ── */
    #theme-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    #theme-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    #theme-sidebar {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 220px;
      background: var(--sidebar-bg, #181818);
      border-left: 1px solid var(--sidebar-border, #252525);
      z-index: 101;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), background 0.3s;
    }

    #theme-sidebar.open {
      transform: translateX(0);
    }

    .theme-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 20px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }

    .theme-option:hover {
      background: var(--sidebar-item-hover, #222);
      color: var(--text);
    }

    .theme-option.active {
      color: var(--text);
    }

    .theme-swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.2s;
    }

    .theme-option.active .theme-swatch {
      border-color: var(--text);
      transform: scale(1.15);
    }

    /* ── SIDEBAR ── */
    #sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    #sidebar-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    #sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 260px;
      background: var(--sidebar-bg, #181818);
      border-right: 1px solid var(--sidebar-border, #252525);
      z-index: 101;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), background 0.3s;
    }

    #sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 18px 20px 16px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo {
      width: 28px;
      height: 28px;
      background: var(--logo-bg, #fff);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .sidebar-logo svg {
      width: 14px;
      height: 14px;
    }

    .sidebar-title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
    }

    .sidebar-section-label {
      font-size: 10px;
      color: var(--sidebar-label, #555);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 18px 20px 8px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .sidebar-item:hover {
      background: var(--sidebar-item-hover, #222);
      color: var(--text);
    }

    .sidebar-item svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .sidebar-item:hover svg {
      opacity: 1;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      font-size: 12.5px;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      border-left: 2px solid transparent;
    }

    .history-item:hover {
      background: var(--sidebar-item-hover, #222);
      color: var(--text);
    }

    .history-item.active {
      border-left-color: var(--text);
      color: var(--text);
    }

    .history-item-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-delete {
      flex-shrink: 0;
      opacity: 0;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: opacity 0.15s, color 0.15s;
      line-height: 1;
    }

    .history-item:hover .history-delete {
      opacity: 1;
    }

    .history-delete:hover {
      color: #f87171;
    }

    .history-empty {
      padding: 10px 20px;
      font-size: 12px;
      color: var(--sidebar-label, #555);
      font-style: italic;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 8px 20px;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--sidebar-footer, #3a3a3a);
    }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 28px 0;
      scroll-behavior: smooth;
    }

    #chat-window::-webkit-scrollbar {
      width: 3px;
    }

    #chat-window::-webkit-scrollbar-thumb {
      background: #1f1f1f;
      border-radius: 2px;
    }

    .messages-inner {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 340px;
      gap: 8px;
      text-align: center;
    }

    .empty-state h2 {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
    }

    .empty-state p {
      color: var(--muted);
      font-size: 13px;
    }

    .msg-row {
      display: flex;
      flex-direction: column;
      animation: fadeUp 0.18s ease;
      margin-bottom: 2px;
    }

    .msg-row.user {
      align-items: flex-end;
      margin-top: 14px;
    }

    .msg-row.ai {
      align-items: flex-start;
      margin-top: 4px;
    }

    .msg-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 5px;
      padding: 0 2px;
    }

    .msg-label.user-label {
      color: rgba(255,255,255,0.4);
    }

    .bubble {
      max-width: 88%;
      padding: 11px 15px;
      border-radius: var(--radius);
      line-height: 1.8;
      font-size: 13.5px;
    }

    .bubble.user {
      background: var(--bubble-user, #0d0d0d);
      border: 1px solid var(--bubble-user-border, #222);
      border-bottom-right-radius: 4px;
    }

    .bubble.ai {
      background: var(--bubble-ai, #0d0d0d);
      border: 1px solid var(--bubble-ai-border, #1f1f1f);
      border-radius: 14px;
    }

    .bubble.ai pre {
      background: var(--code-bg, #111);
      padding: 12px;
      border-radius: 10px;
      overflow-x: auto;
      margin-top: 8px;
      border: 1px solid var(--bubble-ai-border, #1f1f1f);
    }

    .bubble.ai code {
      font-family: var(--font-mono);
      font-size: 12.5px;
    }

    .bubble.thinking {
      color: var(--muted);
      font-style: italic;
    }

    .thinking-dots span {
      display: inline-block;
      animation: blink 1.2s infinite;
    }

    .thinking-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .thinking-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    .code-block {
      position: relative;
      margin-top: 10px;
    }

    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      padding: 6px 10px;
      background: var(--code-header-bg, #0a0a0a);
      border: 1px solid var(--bubble-ai-border, #1f1f1f);
      border-bottom: none;
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
      color: #888;
    }

    .copy-btn {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 11px;
    }

    .copy-btn:hover {
      color: #fff;
    }

    .bubble.ai pre {
      margin: 0;
      border-radius: 0 0 10px 10px;
    }

    @keyframes blink {
      0%,80%,100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .input-area {
      padding: 14px 20px 20px;
      border-top: 1px solid var(--border);
    }

    .input-wrap {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--input-bg, #303030);
      border: 1px solid var(--input-border, rgba(255,255,255,0.08));
      border-radius: var(--radius);
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s, background 0.3s;
    }

    .input-wrap:focus-within {
      border-color: var(--input-border-focus, rgba(255,255,255,0.25));
    }

    #user-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--input-color, var(--text));
      font-family: var(--font-mono);
      font-size: 13.5px;
      line-height: 1.6;
      resize: none;
      max-height: 140px;
      min-height: 24px;
    }

    #user-input::placeholder {
      color: #888;
    }

    #send-btn {
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      background: var(--send-bg, #fff);
      border: none;
      border-radius: 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.15s;
    }

    #send-btn:hover {
      transform: scale(1.05);
    }

    #send-btn svg {
      width: 15px;
      height: 15px;
      color: var(--send-color, #000);
    }

    .input-hint {
      max-width: 700px;
      margin: 7px auto 0;
      font-size: 11px;
      color: var(--hint-color, #444);
      text-align: center;
    }
  </style>
</head>

<body>

<!-- Theme sidebar -->
<div id="theme-overlay" onclick="closeThemeSidebar()"></div>
<div id="theme-sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">Themes</span>
  </div>
  <div id="theme-list"></div>
</div>

<!-- Left sidebar overlay -->
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--logo-stroke, #000)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <span class="sidebar-title">NoteBuddy</span>
  </div>

  <div class="sidebar-section-label">Menu</div>

  <div class="sidebar-item" id="new-chat-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    New Chat
  </div>

  <div class="sidebar-divider"></div>
  <div class="sidebar-section-label">Recent</div>

  <div id="chat-history-list"></div>

  <div class="sidebar-footer">NoteBuddy · School Assistant</div>
</div>

<header>
  <div class="logo-mark" onclick="openSidebar()" title="Open menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="var(--logo-stroke, #000)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
  </div>

  <h1>NoteBuddy</h1>

  <button id="theme-btn" aria-label="Themes">
    <svg id="theme-icon" viewBox="0 0 36 36" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
      <!-- Sun rays ring -->
      <g id="sun-rays" fill="var(--btn-moon, #fff)">
        <polygon points="18,2 19.2,5.5 17,5.5"/>
        <polygon points="18,34 19.2,30.5 17,30.5"/>
        <polygon points="2,18 5.5,19.2 5.5,17"/>
        <polygon points="34,18 30.5,19.2 30.5,17"/>
        <polygon points="6.1,6.1 8.6,9 6.4,9.8"/>
        <polygon points="29.9,29.9 27.4,27 29.6,26.2"/>
        <polygon points="29.9,6.1 27,8.6 26.2,6.4"/>
        <polygon points="6.1,29.9 9,27.4 9.8,29.6"/>
        <polygon points="11,3.2 11.8,6.8 10,7.2"/>
        <polygon points="25,32.8 24.2,29.2 26,28.8"/>
        <polygon points="3.2,25 6.8,24.2 7.2,26"/>
        <polygon points="32.8,11 29.2,11.8 28.8,10"/>
      </g>
      <!-- Outer circle -->
      <circle cx="18" cy="18" r="13" fill="var(--btn-moon, #fff)" opacity="0.15"/>
      <!-- Moon shape (crescent via overlapping circles) -->
      <circle cx="18" cy="18" r="10" fill="var(--btn-moon, #fff)"/>
      <circle cx="22" cy="15" r="8" fill="var(--btn-bg, #111)"/>
      <!-- Stars in the moon -->
      <path d="M13 15 L13.6 16.6 L15.2 16.6 L13.9 17.6 L14.4 19.2 L13 18.2 L11.6 19.2 L12.1 17.6 L10.8 16.6 L12.4 16.6 Z" fill="var(--btn-bg, #111)" transform="scale(0.7) translate(5,5)"/>
      <path d="M13 15 L13.4 16.1 L14.5 16.1 L13.6 16.8 L13.9 17.9 L13 17.2 L12.1 17.9 L12.4 16.8 L11.5 16.1 L12.6 16.1 Z" fill="var(--btn-bg, #111)" transform="translate(-1, 3) scale(0.55)"/>
    </svg>
  </button>
</header>

<div id="chat-window">
  <div class="messages-inner" id="messages">

    <div class="empty-state" id="empty-state">
      <h2>NoteBuddy</h2>
      <p>Ask me any question</p>
    </div>

  </div>
</div>

<div class="input-area">
  <div class="input-wrap">

    <textarea
      id="user-input"
      placeholder="Ask me any question"
      rows="1"
    ></textarea>

    <button id="send-btn" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>

  </div>

  <p class="input-hint">
    Enter to send · Shift+Enter for new line
  </p>
</div>

<script>
const SYSTEM_PROMPT =
'You are NoteBuddy, a school assistant.';

let history = [];
let isLoading = false;
let currentChatId = null;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const chatWindow = document.getElementById('chat-window');

// ── LOCAL STORAGE HELPERS ──
function getAllChats() {
  try { return JSON.parse(localStorage.getItem('nb_chats') || '[]'); }
  catch { return []; }
}

function saveAllChats(chats) {
  localStorage.setItem('nb_chats', JSON.stringify(chats));
}

function saveCurrentChat() {
  if (!currentChatId || history.length === 0) return;
  const chats = getAllChats();
  const idx = chats.findIndex(c => c.id === currentChatId);
  const title = history[0]?.parts[0]?.text?.slice(0, 40) || 'Chat';
  const entry = { id: currentChatId, title, history, ts: Date.now() };
  if (idx >= 0) chats[idx] = entry;
  else chats.unshift(entry);
  saveAllChats(chats);
  renderHistoryList();
}

function loadChat(id) {
  const chats = getAllChats();
  const chat = chats.find(c => c.id === id);
  if (!chat) return;
  currentChatId = id;
  history = chat.history;

  // clear UI
  messagesEl.innerHTML = '';
  history.forEach(msg => {
    const role = msg.role === 'user' ? 'user' : 'ai';
    addMessage(role, msg.parts[0].text);
  });
  renderHistoryList();
  closeSidebar();
}

function deleteChat(id, e) {
  e.stopPropagation();
  const chats = getAllChats().filter(c => c.id !== id);
  saveAllChats(chats);
  if (currentChatId === id) startNewChat();
  else renderHistoryList();
}

function startNewChat() {
  currentChatId = 'chat_' + Date.now();
  history = [];
  messagesEl.innerHTML = `
    <div class="empty-state" id="empty-state">
      <h2>NoteBuddy</h2>
      <p>Ask me any question</p>
    </div>`;
  renderHistoryList();
  closeSidebar();
  inputEl.focus();
}

function renderHistoryList() {
  const list = document.getElementById('chat-history-list');
  const chats = getAllChats();
  if (chats.length === 0) {
    list.innerHTML = '<div class="history-empty">No saved chats yet</div>';
    return;
  }
  list.innerHTML = chats.map(c => `
    <div class="history-item ${c.id === currentChatId ? 'active' : ''}" onclick="loadChat('${c.id}')">
      <span class="history-item-text">${escHtml(c.title)}</span>
      <button class="history-delete" onclick="deleteChat('${c.id}', event)" title="Delete">✕</button>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('new-chat-btn').addEventListener('click', startNewChat);

// init
currentChatId = 'chat_' + Date.now();
renderHistoryList();

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height =
    Math.min(inputEl.scrollHeight, 140) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function formatMessage(text) {
  let html = marked.parse(text);

  html = html.replace(
    /<pre><code class="language-(.*?)">([\s\S]*?)<\/code><\/pre>/g,
    (match, lang, code) => {
      return `
        <div class="code-block">
          <div class="code-header">
            <span>${lang || 'text'}</span>
            <button class="copy-btn"
              onclick="copyCode(this)">
              📋 copy
            </button>
          </div>

          <pre>
<code class="language-${lang}">
${code}
</code>
          </pre>
        </div>
      `;
    }
  );

  return html;
}

function addMessage(role, text, isThinking = false) {
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const label = document.createElement('div');
  label.className =
    `msg-label ${role === 'user' ? 'user-label' : ''}`;

  label.textContent =
    role === 'user' ? 'You' : 'NoteBuddy';

  const bubble = document.createElement('div');

  bubble.className =
    `bubble ${role}${isThinking ? ' thinking' : ''}`;

  if (isThinking) {
    bubble.innerHTML =
      'Thinking <span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>';
  } else {
    bubble.innerHTML = formatMessage(text);

    requestAnimationFrame(() => {
      bubble.querySelectorAll('pre code')
        .forEach(block => {
          Prism.highlightElement(block);
        });
    });
  }

  row.appendChild(label);
  row.appendChild(bubble);

  messagesEl.appendChild(row);

  chatWindow.scrollTop = chatWindow.scrollHeight;

  return bubble;
}

async function sendMessage() {
  const text = inputEl.value.trim();

  if (!text || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;

  inputEl.value = '';
  inputEl.style.height = 'auto';

  addMessage('user', text);

  history.push({
    role: 'user',
    parts: [{ text }]
  });

  const bubble = addMessage('ai', '', true);

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },

      body: JSON.stringify({
        history,
        system: SYSTEM_PROMPT
      })
    });

    const data = await response.json();

    const reply = data.reply || 'No response.';

    bubble.classList.remove('thinking');
    bubble.innerHTML = '';

    history.push({
      role: 'model',
      parts: [{ text: reply }]
    });

    let i = 0;
    let buffer = '';
    let last = 0;

    function type() {
      const now = performance.now();

      if (now - last < 8) {
        requestAnimationFrame(type);
        return;
      }

      last = now;

      if (i < reply.length) {
        buffer += reply[i];

        bubble.innerHTML = buffer;

        i++;

        chatWindow.scrollTop =
          chatWindow.scrollHeight;

        requestAnimationFrame(type);

      } else {

        bubble.innerHTML =
          formatMessage(buffer);

        requestAnimationFrame(() => {
          bubble.querySelectorAll('pre code')
            .forEach(block => {
              Prism.highlightElement(block);
            });
        });

        isLoading = false;
        sendBtn.disabled = false;
        saveCurrentChat();
        inputEl.focus();
      }
    }

    type();

  } catch (err) {

    bubble.classList.remove('thinking');

    bubble.style.color = '#f87171';

    bubble.textContent =
      'Error: ' + err.message;

    isLoading = false;
    sendBtn.disabled = false;
  }
}

function copyCode(button) {
  const code =
    button.closest('.code-block')
      .querySelector('code')
      .innerText;

  navigator.clipboard.writeText(code)
    .then(() => {

      button.textContent = '✓ copied';

      setTimeout(() => {
        button.textContent = '📋 copy';
      }, 2000);

    });
}

let currentTheme = 0;

// Swatch colours (bg of each theme)
const SWATCHES = ['#212121','#f5f5f0','#0d1117','#1a1f1a','#1c1510','#e8ddd0'];

function buildThemeList() {
  const list = document.getElementById('theme-list');
  THEMES.forEach((t, i) => {
    const opt = document.createElement('div');
    opt.className = 'theme-option' + (i === 0 ? ' active' : '');
    opt.dataset.index = i;

    const swatch = document.createElement('div');
    swatch.className = 'theme-swatch';
    swatch.style.background = SWATCHES[i];

    opt.appendChild(swatch);
    opt.appendChild(document.createTextNode(t.name));
    opt.addEventListener('click', () => selectTheme(i));
    list.appendChild(opt);
  });
}

function selectTheme(i) {
  currentTheme = i;
  applyTheme(THEMES[i]);
  localStorage.setItem('nb_theme', i);
  document.querySelectorAll('.theme-option').forEach((el, j) => {
    el.classList.toggle('active', j === i);
    el.querySelector('.theme-swatch').style.background = SWATCHES[j];
  });
}

function applyTheme(t) {
  const root = document.documentElement;
  Object.entries(t).forEach(([k, v]) => {
    if (k !== 'name') root.style.setProperty(k, v);
  });
  document.body.style.background = t['--bg'];
  document.querySelector('header').style.background = t['--header-bg'];
  document.getElementById('theme-sidebar').style.background = t['--sidebar-bg'];
}

function openThemeSidebar() {
  document.getElementById('theme-sidebar').classList.add('open');
  document.getElementById('theme-overlay').classList.add('open');
}

function closeThemeSidebar() {
  document.getElementById('theme-sidebar').classList.remove('open');
  document.getElementById('theme-overlay').classList.remove('open');
}

document.getElementById('theme-btn').addEventListener('click', openThemeSidebar);

buildThemeList();

// restore saved theme
const savedTheme = parseInt(localStorage.getItem('nb_theme') || '0', 10);
if (savedTheme !== 0) selectTheme(savedTheme);
else selectTheme(0);

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeSidebar(); closeThemeSidebar(); }
});
