<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteBuddy</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>

<script>
Prism.plugins.autoloader.languages_path =
  "https://cdn.jsdelivr.net/npm/prismjs/components/";
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #ffffff;
  --text: #ececf1;
  --muted: #555;
  --border: #1a1a1a;
  --radius: 14px;
  --mono: "DM Mono", monospace;
  --display: "Syne", sans-serif;
}

body {
  background: #212121;
  color: var(--text);
  font-family: var(--mono);
  height: 100vh;
  overflow: hidden;
}

/* ===== SIDEBAR (NEW ONLY) ===== */
#sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 260px;
  height: 100%;
  background: #0f0f0f;
  border-right: 1px solid var(--border);
  transform: translateX(-100%);
  transition: 0.2s ease;
  padding: 12px;
  z-index: 1000;
}

#sidebar.open {
  transform: translateX(0);
}

#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  z-index: 900;
}

#overlay.show {
  display: block;
}

.sidebar-item {
  padding: 10px;
  color: var(--muted);
  cursor: pointer;
  border-radius: 8px;
}

.sidebar-item:hover {
  background: #141414;
  color: var(--text);
}

/* ===== HEADER (original + button added) ===== */
header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.menu-btn {
  width: 34px;
  height: 34px;
  background: #111;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

/* ===== EVERYTHING BELOW = YOUR ORIGINAL STYLE ===== */

#chat-window {
  flex: 1;
  overflow-y: auto;
  padding: 28px 0;
  height: calc(100vh - 70px);
}

.messages-inner {
  max-width: 700px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  flex-direction: column;
}

.msg-row {
  display: flex;
  flex-direction: column;
}

.msg-row.user { align-items: flex-end; }
.msg-row.ai { align-items: flex-start; }

.msg-label {
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 5px;
}

.bubble {
  max-width: 88%;
  padding: 11px 15px;
  border-radius: var(--radius);
  background: #0d0d0d;
  border: 1px solid #1f1f1f;
  font-size: 13px;
  line-height: 1.6;
}

/* INPUT */
.input-area {
  border-top: 1px solid var(--border);
  padding: 14px;
}

.input-wrap {
  max-width: 700px;
  margin: auto;
  display: flex;
  gap: 10px;
  background: #303030;
  border-radius: var(--radius);
  padding: 10px;
}

#user-input {
  flex: 1;
  background: none;
  border: none;
  color: white;
  outline: none;
}

#send-btn {
  width: 34px;
  background: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-item">New Chat</div>
</div>

<div id="overlay"></div>

<!-- HEADER -->
<header>
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <h1>NoteBuddy</h1>
</header>

<!-- CHAT -->
<div id="chat-window">
  <div class="messages-inner" id="messages"></div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-wrap">
    <textarea id="user-input"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

function toggleSidebar() {
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

overlay.onclick = () => {
  sidebar.classList.remove("open");
  overlay.classList.remove("show");
};

function add(role, text) {
  const row = document.createElement("div");
  row.className = "msg-row " + role;

  const label = document.createElement("div");
  label.className = "msg-label";
  label.textContent = role === "user" ? "You" : "NoteBuddy";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;

  row.appendChild(label);
  row.appendChild(bubble);
  document.getElementById("messages").appendChild(row);
}

async function sendMessage() {
  const input = document.getElementById("user-input");
  const text = input.value.trim();
  if (!text) return;

  add("user", text);
  input.value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      history: [{ role: "user", parts: [{ text }] }]
    })
  });

  const data = await res.json();
  add("ai", data.reply || "No response");
}
</script>

</body>
</html>
