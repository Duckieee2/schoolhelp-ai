<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteBuddy</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=Syne:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet" />

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>

<style>
body {
  margin:0;
  display:flex;
  height:100vh;
  font-family: DM Mono;
  background:#212121;
  color:#eee;
  overflow:hidden;
}

/* SIDEBAR */
#sidebar {
  width:260px;
  background:#0f0f0f;
  border-right:1px solid #222;
  padding:10px;
  overflow-y:auto;
}

.chat-item {
  padding:8px;
  margin:5px 0;
  background:#151515;
  border-radius:6px;
  cursor:pointer;
}

.chat-item:hover { background:#222; }

/* MAIN */
#main {
  flex:1;
  display:flex;
  flex-direction:column;
}

#messages {
  flex:1;
  overflow:auto;
  padding:20px;
}

.msg { margin:10px 0; }

.user { text-align:right; color:#9f9; }

.ai {
  background:#111;
  padding:10px;
  border-radius:10px;
}

.input {
  display:flex;
  padding:10px;
  border-top:1px solid #222;
}

textarea {
  flex:1;
  background:#222;
  border:none;
  color:#fff;
  padding:10px;
  resize:none;
}

button {
  background:#fff;
  border:none;
  margin-left:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <button onclick="newChat()">+ New Chat</button>
  <div id="chatList"></div>
</div>

<!-- MAIN -->
<div id="main">

  <div id="messages"></div>

  <div class="input">
    <textarea id="input"></textarea>
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
const STORAGE = "notebuddy_chats";

let chats = JSON.parse(localStorage.getItem(STORAGE) || "[]");
let active = null;
let history = [];

const messagesEl = document.getElementById("messages");
const chatList = document.getElementById("chatList");
const input = document.getElementById("input");

/* ---------- CHAT STORAGE ---------- */
function save() {
  localStorage.setItem(STORAGE, JSON.stringify(chats));
}

/* ---------- SIDEBAR ---------- */
function renderChats() {
  chatList.innerHTML = "";

  chats.forEach(c => {
    const div = document.createElement("div");
    div.className = "chat-item";
    div.textContent = c.title || "Chat";
    div.onclick = () => loadChat(c.id);
    chatList.appendChild(div);
  });
}

/* ---------- NEW CHAT ---------- */
function newChat() {
  active = {
    id: crypto.randomUUID(),
    title: "New chat",
    history: []
  };

  chats.unshift(active);
  save();
  renderChats();

  history = [];
  messagesEl.innerHTML = "";
}

/* ---------- LOAD CHAT ---------- */
function loadChat(id) {
  active = chats.find(c => c.id === id);
  history = active.history;

  messagesEl.innerHTML = "";

  history.forEach(m => {
    add(m.role, m.text, false);
  });
}

/* ---------- MESSAGE RENDER ---------- */
function add(role, text, saveMsg = true) {
  const div = document.createElement("div");
  div.className = "msg " + (role === "user" ? "user" : "ai");

  div.innerHTML = role === "user"
    ? text
    : marked.parse(text);

  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  if (role === "assistant" && window.Prism) {
    requestIdleCallback(() => {
      div.querySelectorAll("pre code").forEach(b => {
        Prism.highlightElement(b);
      });
    });
  }

  if (saveMsg && active) {
    history.push({ role, text });

    active.history = history;
    active.title = active.title === "New chat"
      ? history[0]?.text?.slice(0, 25)
      : active.title;

    save();
    renderChats();
  }
}

/* ---------- SEND ---------- */
async function send() {
  const text = input.value.trim();
  if (!text) return;

  input.value = "";

  add("user", text);

  const bubble = document.createElement("div");
  bubble.className = "msg ai";
  messagesEl.appendChild(bubble);

  let reply = "";

  try {
    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ history })
    });

    const data = await res.json();
    reply = data.reply || "No response";

  } catch (e) {
    reply = "Error: " + e.message;
  }

  /* FAST RENDER (NO DOM PER CHAR) */
  let i = 0;

  function type() {
    if (i < reply.length) {
      bubble.innerHTML = reply.slice(0, i++);
      requestAnimationFrame(type);
    } else {
      bubble.innerHTML = marked.parse(reply);

      if (window.Prism) {
        bubble.querySelectorAll("pre code").forEach(b =>
          Prism.highlightElement(b)
        );
      }

      add("assistant", reply);
    }
  }

  type();
}

/* INIT */
newChat();
renderChats();

</script>

</body>
</html>
