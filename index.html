<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteBuddy</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#212121;
  --panel:#0d0d0d;
  --border:#1a1a1a;
  --text:#ececf1;
  --muted:#666;
  --accent:#d4f570;
  --radius:14px;
  --mono:'DM Mono', monospace;
  --display:'Syne', sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--mono);
  height:100vh;
  display:flex;
  overflow:hidden;
}

/* OVERLAY */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(2px);
  opacity:0;
  pointer-events:none;
  transition:0.15s;
}
#overlay.show{
  opacity:1;
  pointer-events:auto;
}

/* SIDEBAR ISLAND */
#sidebar{
  width:220px;
  max-height:60vh;
  background:#0d0d0d;
  border:1px solid #1f1f1f;
  border-radius:14px;
  padding:10px;
  position:absolute;
  top:70px;
  left:14px;
  z-index:20;

  display:flex;
  flex-direction:column;
  gap:8px;

  transform:scale(0.98);
  opacity:0;
  pointer-events:none;
  transition:0.15s;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

#sidebar.open{
  transform:scale(1);
  opacity:1;
  pointer-events:auto;
}

.chat-item{
  padding:8px 10px;
  background:#111;
  border:1px solid #1f1f1f;
  border-radius:10px;
  cursor:pointer;
  font-size:12px;
}

.chat-item:hover{
  background:#161616;
}

/* MAIN */
main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px;
  border-bottom:1px solid var(--border);
}

.icon-btn{
  width:34px;
  height:34px;
  background:#333;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:white;
}

h1{
  font-family:var(--display);
  font-size:16px;
}

/* CHAT */
#chat{
  flex:1;
  overflow:auto;
  padding:20px;
}

.msg{
  margin:8px 0;
  max-width:80%;
  padding:10px 12px;
  border-radius:12px;
  font-size:13px;
  line-height:1.5;
}

.user{
  margin-left:auto;
  background:#0d0d0d;
  border:1px solid #222;
}

.ai{
  background:#111;
  border:1px solid #1f1f1f;
}

/* INPUT */
#inputBar{
  display:flex;
  padding:10px;
  border-top:1px solid var(--border);
}

textarea{
  flex:1;
  resize:none;
  border:none;
  background:#2a2a2a;
  color:white;
  padding:10px;
  border-radius:10px;
  outline:none;
}

button.send{
  margin-left:10px;
  width:40px;
  border:none;
  background:var(--accent);
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="overlay" onclick="toggleSidebar()"></div>
<div id="sidebar"></div>

<main>

<header>
  <button class="icon-btn" onclick="toggleSidebar()">☰</button>
  <h1>NoteBuddy</h1>
</header>

<div id="chat"></div>

<div id="inputBar">
  <textarea id="input"></textarea>
  <button class="send" onclick="send()">➤</button>
</div>

</main>

<script>
let chats = JSON.parse(localStorage.getItem("chats") || "[]");
let currentChat = [];

const chatEl = document.getElementById("chat");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const input = document.getElementById("input");

/* SIDEBAR */
function toggleSidebar(){
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
  renderSidebar();
}

function renderSidebar(){
  sidebar.innerHTML = "";

  const newBtn = document.createElement("div");
  newBtn.className = "chat-item";
  newBtn.textContent = "+ New Chat";
  newBtn.onclick = () => {
    currentChat = [];
    chatEl.innerHTML = "";
    toggleSidebar();
  };
  sidebar.appendChild(newBtn);

  chats.forEach((c,i)=>{
    const div = document.createElement("div");
    div.className = "chat-item";
    div.textContent = "Chat " + (i+1);
    div.onclick = () => {
      loadChat(i);
      toggleSidebar();
    };
    sidebar.appendChild(div);
  });
}

/* LOAD */
function loadChat(i){
  currentChat = chats[i];
  chatEl.innerHTML = "";
  currentChat.forEach(m=>{
    addMsg(m.role,m.text);
  });
}

/* CHAT */
function addMsg(role,text){
  const div = document.createElement("div");
  div.className = "msg " + (role==="user"?"user":"ai");
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

/* SEND */
async function send(){
  const text = input.value.trim();
  if(!text) return;

  input.value = "";

  addMsg("user",text);
  currentChat.push({role:"user",text});

  const resDiv = document.createElement("div");
  resDiv.className = "msg ai";
  resDiv.textContent = "Thinking...";
  chatEl.appendChild(resDiv);

  const res = await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({history:currentChat})
  });

  const data = await res.json();
  resDiv.textContent = data.reply;

  currentChat.push({role:"ai",text:data.reply});
  save();
}

/* SAVE */
function save(){
  if(currentChat.length){
    chats.push([...currentChat]);
    localStorage.setItem("chats",JSON.stringify(chats));
  }
}

/* CLICK OUTSIDE CLOSE */
document.addEventListener("click",(e)=>{
  if(!sidebar.contains(e.target) && !e.target.closest(".icon-btn")){
    sidebar.classList.remove("open");
    overlay.classList.remove("show");
  }
});

renderSidebar();
</script>

</body>
</html>
